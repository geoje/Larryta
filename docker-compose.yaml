volumes:
  db:

services:
  db:
    image: mysql:8.4.9
    restart: unless-stopped
    ports: [ "3309:3306" ]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: larryta
      LANG: C.UTF-8
    volumes:
      - db:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
